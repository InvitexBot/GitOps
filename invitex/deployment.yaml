apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: invitex
  namespace: apps
spec:
  serviceName: invitex
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: invitex
  template:
    metadata:
      labels:
        app: invitex
    spec:
      imagePullSecrets:
        - name: ghcr.io
      containers:
        - name: invitex
          image: ghcr.io/invitexbot/invitex:sha-b72b638
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: invitex-env
          env:
            # CLUSTER_ID is derived from the pod's ordinal index (0, 1, 2...).
            # Requires Kubernetes 1.28+. If your cluster is older, remove this
            # block and set CLUSTER_ID manually in invitex-env.
            - name: CLUSTER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kill -0 1
            periodSeconds: 10
            failureThreshold: 36
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kill -0 1
            periodSeconds: 15
            timeoutSeconds: 2
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kill -0 1
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
