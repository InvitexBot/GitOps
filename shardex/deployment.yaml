apiVersion: apps/v1
kind: Deployment
metadata:
  name: shardex
  namespace: apps
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shardex
  template:
    metadata:
      labels:
        app: shardex
    spec:
      imagePullSecrets:
        - name: ghcr.io
      containers:
        - name: shardex
          image: ghcr.io/invitexbot/shardex:placeholder
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 6000
          envFrom:
            - secretRef:
                name: shardex-env
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
