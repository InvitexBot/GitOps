apiVersion: apps/v1
kind: Deployment
metadata:
  name: connex
  namespace: apps
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: connex
  template:
    metadata:
      labels:
        app: connex
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ghcr.io
      containers:
        - name: connex
          image: ghcr.io/invitexbot/connex:placeholder
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - secretRef:
                name: connex-env
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
